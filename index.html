<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decoy — The Social Deduction Party Game</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #111111;
      color: #F7F5F2;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      text-align: center;
    }
    .hero { margin-top: 100px; padding: 20px; flex-grow: 1; }
    .app-icon {
      width: 180px;
      height: 180px;
      border-radius: 22.5%;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    h1 { font-size: 48px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 20px; color: #aaaaaa; margin-bottom: 40px; }
    .download-btn {
      background-color: #F7F5F2;
      color: #111111;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }
    .footer {
      padding: 40px;
      font-size: 14px;
      color: #666666;
    }
    .footer a {
      color: #888888;
      text-decoration: none;
      margin: 0 10px;
    }
    .footer a:hover { color: #F7F5F2; }
    
    /* Carousel Styles */
    .carousel-container {
      width: 100%;
      margin: 60px 0 20px;
      overflow: hidden;
    }
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 20px;
      padding: 20px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .carousel::-webkit-scrollbar { display: none; }
    
    /* Center the first and last images */
    .carousel::before, .carousel::after {
      content: '';
      flex: 0 0 calc(50vw - 120px);
    }
    
    .carousel img {
      height: 500px;
      width: auto;
      border-radius: 20px;
      scroll-snap-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid #222;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .carousel::before, .carousel::after {
        flex: 0 0 calc(50vw - 90px);
      }
      .carousel img {
        height: 400px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="icon.png" alt="Decoy App Icon" class="app-icon">
    <h1>DECOY</h1>
    <p>Lying builds stronger bonds. Trust no one.</p>
    
    <!-- Link this to your App Store URL once it's published! -->
    <a href="#" class="download-btn">Download on the App Store</a>
  </div>

  <div class="carousel-container">
    <div class="carousel">
      <img src="ss1.png" alt="Screenshot 1">
      <img src="ss2.png" alt="Screenshot 2">
      <img src="ss3.png" alt="Screenshot 3">
      <img src="ss4.png" alt="Screenshot 4">
      <img src="ss5.png" alt="Screenshot 5">
      <img src="ss6.png" alt="Screenshot 6">
      <img src="ss7.png" alt="Screenshot 7">
    </div>
  </div>

  <div class="footer">
    <p>Support: <a href="mailto:support-decoy@theplace.au">support-decoy@theplace.au</a></p>
    <div style="margin-top: 16px;">
      <a href="privacy-policy.html">Privacy Policy</a> | 
      <a href="terms-of-use.html">Terms of Use</a>
    </div>
  </div>

</body>
</html>
